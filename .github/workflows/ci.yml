name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.lock
      - name: Syntax check
        run: python -m compileall SourceCode tests smoke_test.py run_integration_tests.py tools
      - name: Smoke test
        run: python smoke_test.py
      - name: Unit and integration tests
        run: python run_integration_tests.py
      - name: UI smoke test
        run: python tools/ui_phase_smoke.py
      - name: Repo health check
        run: python tools/repo_health_check.py
